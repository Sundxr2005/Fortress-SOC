version: '3.8'

networks:
  sentrix-net:
    external: true

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    networks:
      sentrix-net:
        ipv4_address: 192.168.50.50

  protected-app:
    build: ./iam-waf/protected-app
    container_name: protected-app
    ports:
      - "5000:5000"
    networks:
      sentrix-net:
        ipv4_address: 192.168.50.60
    depends_on:
      - keycloak

  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    networks:
      sentrix-net:
        ipv4_address: 192.168.50.21

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: waf
    ports:
      - "80:8080"
    environment:
      - BACKEND=http://192.168.50.21:80
      - MODSEC_RULE_ENGINE=On
    depends_on:
      - dvwa
    networks:
      sentrix-net:
        ipv4_address: 192.168.50.40

